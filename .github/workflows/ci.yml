name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Match the dev environment (npm 11 generated package-lock.json;
          # older npm rejects it as out-of-sync during `npm ci`).
          node-version: 24
          cache: npm

      - name: Install dependencies
        # Prefer reproducible `npm ci`; fall back to `npm install` if the
        # lockfile is rejected by a different npm version on the runner.
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Lint
        run: npx eslint src --ext .js,.jsx --max-warnings 0

      - name: Test
        run: npm test -- --watchAll=false
        env:
          CI: true

      - name: Build
        run: npx react-scripts build
        env:
          CI: false
          REACT_APP_SUPABASE_URL: https://placeholder.supabase.co
          REACT_APP_SUPABASE_ANON_KEY: placeholder-anon-key
