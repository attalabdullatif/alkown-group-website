<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الخريطة السياحية التفاعلية | الكون العالمية</title>

  <!-- Leaflet CSS (CDN) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <!-- Google Font (Cairo) for clean Arabic typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ════════════════════════════════════════════════════════════
       Tourism Map App — single self-contained widget.
       Everything lives inside #tm-app so it can be embedded safely.
       ════════════════════════════════════════════════════════════ -->
  <div id="tm-app">

    <!-- Header: brand + country tabs (tabs are generated by app.js) -->
    <header id="tm-header">
      <div class="tm-brand">
        <span class="tm-logo">الكون</span>
        <span class="tm-title">الخريطة السياحية التفاعلية</span>
      </div>
      <!-- Country tabs are injected here dynamically from data.json -->
      <nav id="tm-tabs" class="tm-tabs" aria-label="اختيار الدولة"></nav>
    </header>

    <!-- Main area: map + sliding details panel -->
    <div id="tm-main">
      <div id="map" role="application" aria-label="خريطة المواقع السياحية"></div>

      <!-- Details panel (sidebar on desktop, bottom sheet on mobile) -->
      <aside id="tm-panel" class="tm-panel" aria-live="polite">
        <button id="tm-panel-close" class="tm-panel-close" aria-label="إغلاق">✕</button>
        <div id="tm-panel-body" class="tm-panel-body">
          <!-- Empty state -->
          <div class="tm-empty">
            <div class="tm-empty-icon">🗺️</div>
            <p>اختر دولة ثم اضغط على أي علامة على الخريطة لعرض تفاصيل الموقع.</p>
          </div>
        </div>
      </aside>
    </div>

    <!-- Loading / error overlay -->
    <div id="tm-overlay" class="tm-overlay">جارٍ تحميل الخريطة…</div>
  </div>

  <!-- Leaflet JS (CDN) -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- App logic -->
  <script src="app.js"></script>
</body>
</html>
