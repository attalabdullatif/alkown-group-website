    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">

    <!-- Dubai Bold — primary font -->
    <style>
      @font-face {
        font-family: 'Dubai';
        src: url('/fonts/DUBAI-BOLD.TTF') format('truetype');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
    </style>

    <!-- Fallback Google Fonts — preconnect first -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Noto+Naskh+Arabic:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Preload critical assets -->
    <link rel="preload" href="/fonts/DUBAI-BOLD.TTF" as="font" type="font/truetype" crossorigin />
    <link rel="preload" href="/logo.png" as="image" />

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='25' y='25' width='50' height='50' fill='%23c9a84c' transform='rotate(45 50 50)'/></svg>" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        font-family: 'Dubai', 'Cairo', 'Noto Naskh Arabic', sans-serif;
        background: #fffdf8;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }

      /* Loading screen */
      #loading-screen {
        position: fixed; inset: 0; z-index: 9999;
        background: #faf8f4;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 16px;
        transition: opacity 0.6s ease;
      }
      #loading-screen.hidden { opacity: 0; pointer-events: none; }
      .loading-logo {
        font-family: 'Dubai', 'Cairo', sans-serif;
        font-size: 3rem; font-weight: 700;
        background: linear-gradient(135deg, #c9a84c 0%, #f0d080 40%, #c9a84c 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 2px 12px rgba(180,140,50,0.5));
      }
      .loading-bar {
        width: 120px; height: 2px;
        background: #e0d8cc; border-radius: 1px; overflow: hidden;
      }
      .loading-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #c9a84c, #f0d080);
        border-radius: 1px;
        animation: loadFill 1.4s ease forwards;
      }
      @keyframes loadFill { from { width: 0; } to { width: 100%; } }
      .loading-sub {
        font-family: Georgia, serif;
        font-size: 0.65rem; letter-spacing: 0.28em;
        color: #c9a84c; text-transform: uppercase;
      }

      /* Route-level lazy loading fallback */
      .lazy-fallback {
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        background: #faf8f4;
        color: #c9a84c;
        font-family: 'Dubai', 'Cairo', sans-serif;
        font-size: 1.5rem;
        letter-spacing: .2em;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Loading screen -->
    <div id="loading-screen">
      <div class="loading-logo">الكون</div>
      <div class="loading-bar"><div class="loading-bar-fill"></div></div>
      <div class="loading-sub">ALKOWN GLOBAL</div>
    </div>

    <div id="root"></div>

    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var ls = document.getElementById('loading-screen');
          if (ls) {
            ls.classList.add('hidden');
            setTimeout(function() { ls.remove(); }, 700);
          }
        }, 1200);
      });
    </script>
  </body>
</html>
