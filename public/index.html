<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#c9a84c" />

    <!-- SEO -->
    <title>Alkown Group | مجموعة الكون</title>
    <meta name="description" content="Alkown Group — Premium UAE-based consultancy for Travel & Visas, Citizenship Programs, Advertising Agency, and Skills Academy. مجموعة الكون للسفر والجنسية والإعلان والتعليم." />
    <meta name="keywords" content="alkown, alkown group, الكون, مجموعة الكون, UAE visa, citizenship, advertising agency, skills academy, Dubai consultancy" />
    <meta name="author" content="Alkown Group" />

    <!-- Open Graph -->
    <meta property="og:title" content="Alkown Group | مجموعة الكون" />
    <meta property="og:description" content="Premium global services — Travel, Citizenship, Advertising & Education" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://alkown.global" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Alkown Group | مجموعة الكون" />
    <meta name="twitter:description" content="Premium UAE consultancy — Travel, Citizenship, Advertising & Academy" />

    <!-- Fonts preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Cairo:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon inline (gold diamond) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='25' y='25' width='50' height='50' fill='%23c9a84c' transform='rotate(45 50 50)'/></svg>" />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        font-family: 'Cormorant Garamond', 'Noto Naskh Arabic', 'Cairo', Georgia, serif;
        background: #fffdf8;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }
      /* Prevent flash of unstyled content */
      #loading-screen {
        position: fixed; inset: 0; z-index: 9999;
        background: #faf8f4;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 16px;
        transition: opacity 0.6s ease;
      }
      #loading-screen.hidden { opacity: 0; pointer-events: none; }
      .loading-logo {
        font-family: 'Noto Naskh Arabic', serif;
        font-size: 3rem; font-weight: 700;
        background: linear-gradient(135deg, #c9a84c 0%, #f0d080 40%, #c9a84c 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 2px 12px rgba(180,140,50,0.5));
      }
      .loading-bar {
        width: 120px; height: 2px;
        background: #e0d8cc; border-radius: 1px; overflow: hidden;
      }
      .loading-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #c9a84c, #f0d080);
        border-radius: 1px;
        animation: loadFill 1.4s ease forwards;
      }
      @keyframes loadFill {
        from { width: 0; }
        to { width: 100%; }
      }
      .loading-sub {
        font-family: Georgia, serif;
        font-size: 0.65rem; letter-spacing: 0.28em;
        color: #c9a84c; text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Loading screen -->
    <div id="loading-screen">
      <div class="loading-logo">الكون</div>
      <div class="loading-bar"><div class="loading-bar-fill"></div></div>
      <div class="loading-sub">ALKOWN GROUP</div>
    </div>

    <div id="root"></div>

    <!-- Hide loading screen after app loads -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var ls = document.getElementById('loading-screen');
          if (ls) {
            ls.classList.add('hidden');
            setTimeout(function() { ls.remove(); }, 700);
          }
        }, 1200);
      });
    </script>
  </body>
</html>
